<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sovereign Forge</title>
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Forge%22,%22short_name%22:%22Forge%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23000%22,%22theme_color%22:%22%23000%22}">
    <style>
        :root { --accent: #00ff88; --bg: #000; --panel: #111; --border: #333; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; padding-top: env(safe-area-inset-top); display: flex; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box; }
        #viewer { width: 100%; aspect-ratio: 1; background: var(--panel); border-radius: 16px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); overflow: hidden; position: relative; }
        img { width: 100%; height: 100%; object-fit: cover; }
        .controls { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; }
        textarea { width: 100%; background: var(--panel); border: 1px solid var(--border); color: #fff; padding: 16px; border-radius: 12px; font-size: 17px; box-sizing: border-box; resize: none; outline: none; }
        button { width: 100%; border: none; padding: 18px; border-radius: 12px; font-weight: 700; font-size: 17px; cursor: pointer; }
        #forge-btn { background: var(--accent); color: #000; }
        #save-btn { background: var(--panel); color: var(--accent); border: 1px solid var(--accent); display: none; }
        #status-area { width: 100%; margin-top: 15px; text-align: center; }
        #status { font-size: 13px; color: #888; margin-bottom: 8px; }
        .progress-bar { width: 100%; height: 6px; background: #222; border-radius: 3px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s ease; }
    </style>
</head>
<body>

    <div id="viewer"><span id="placeholder">A19 Silicon Ready...</span></div>

    <div class="controls">
        <textarea id="prompt" rows="3" placeholder="Vision (e.g., 'Douglas Fir Timber close-up')..."></textarea>
        <button id="forge-btn">FORGE IMAGE</button>
        <button id="save-btn">SAVE TO VAULT</button>
        <div id="status-area">
            <div id="status">Ready. WebGPU v3 Initialized.</div>
            <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
        </div>
    </div>

    <script type="module">
        // Using the 2026 WebGPU specialized diffusion library
        import { Client } from 'https://cdn.jsdelivr.net/npm/web-txt2img@1.2.0/dist/index.js';

        let client = null;
        let lastImageBlob = null;
        const btn = document.getElementById('forge-btn');
        const saveBtn = document.getElementById('save-btn');
        const status = document.getElementById('status');
        const progress = document.getElementById('progress');

        async function init() {
            status.innerText = "Claiming A19 GPU Memory...";
            client = new Client();
            
            // Check for WebGPU support
            const support = await client.detect();
            if (!support.webgpu) {
                status.innerText = "Error: Enable WebGPU in Safari Advanced Settings.";
                return false;
            }

            try {
                // Load SD-Turbo specifically optimized for browser WebGPU
                await client.load('sd-turbo', {
                    onProgress: (p) => {
                        const pct = Math.round(p.pct * 100);
                        progress.style.width = `${pct}%`;
                        status.innerText = `Hydrating Forge: ${pct}%`;
                    }
                });
                status.innerText = "Forge Online. Zero-Cloud Active.";
                return true;
            } catch (err) {
                status.innerText = "Init Failed: " + err.message;
                return false;
            }
        }

        btn.onclick = async () => {
            const pText = document.getElementById('prompt').value;
            if (!pText) return;

            if (!client) {
                const ok = await init();
                if (!ok) return;
            }

            btn.disabled = true;
            btn.innerText = "FORGING...";
            status.innerText = "A19 Neural Engine Processing...";
            
            const start = performance.now();
            try {
                // Real-time generation via WebGPU
                const result = await client.generate(pText);
                const end = performance.now();
                
                lastImageBlob = result.blob;
                const url = URL.createObjectURL(lastImageBlob);
                
                document.getElementById('viewer').innerHTML = `<img src="${url}">`;
                saveBtn.style.display = "block";
                status.innerText = `Forged in ${((end - start)/1000).toFixed(2)}s`;
                progress.style.width = "100%";
            } catch (err) {
                status.innerText = "Forge Error: " + err.message;
            } finally {
                btn.disabled = false;
                btn.innerText = "FORGE IMAGE";
            }
        };

        saveBtn.onclick = () => {
            if (!lastImageBlob) return;
            const link = document.createElement('a');
            link.href = URL.createObjectURL(lastImageBlob);
            link.download = `SovereignForge_${Date.now()}.png`;
            link.click();
        };
    </script>
</body>
</html>
