<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Probe</title>
    <style>
        body { background: #000; color: #00ff88; font-family: monospace; padding: 20px; font-size: 14px; line-height: 1.5; }
        #console { white-space: pre-wrap; word-wrap: break-word; }
        .fail { color: #ff3333; font-weight: bold; }
        .pass { color: #00ccff; }
    </style>
</head>
<body>
    <div id="console">> Initiating Core Systems Diagnostic...<br><br></div>
    <script type="module">
        const consoleEl = document.getElementById('console');
        const log = (msg, status = '') => {
            let className = '';
            if (status === 'pass') className = 'pass';
            if (status === 'fail') className = 'fail';
            consoleEl.innerHTML += `<span class="${className}">> ${msg}</span><br>`;
        };

        async function runDiagnostics() {
            // TEST 1: The Hardware Handshake
            log("TEST 1: Requesting A19 WebGPU Adapter...");
            if (!navigator.gpu) {
                log("FAIL: navigator.gpu is undefined. Safari is strictly blocking WebGPU.", "fail");
                return;
            }
            try {
                const adapter = await navigator.gpu.requestAdapter();
                if (!adapter) {
                    log("FAIL: WebGPU exists, but the device refused to hand over the adapter.", "fail");
                    return;
                }
                log(`PASS: WebGPU Secured. Max Buffer Size: ${adapter.limits.maxStorageBufferBindingSize}`, "pass");
            } catch (e) {
                log(`FAIL: WebGPU request threw an error: ${e.message}`, "fail");
                return;
            }

            // TEST 2: The Network/Library Handshake
            log("<br>TEST 2: Importing Transformers.js Engine...");
            let env, pipeline;
            try {
                const transformers = await import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0-alpha.19');
                env = transformers.env;
                pipeline = transformers.pipeline;
                log("PASS: Library imported successfully.", "pass");
            } catch (e) {
                log(`FAIL: CDN Import error: ${e.message}`, "fail");
                return;
            }

            // TEST 3: The Pipeline Test (Tiny Model)
            log("<br>TEST 3: Fetching 20MB test model to verify pipeline...");
            try {
                env.allowLocalModels = false;
                const testPipe = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2', {
                    device: 'webgpu',
                    dtype: 'q4'
                });
                log("PASS: Test model loaded. The plumbing is completely functional.", "pass");
                log("<br>== DIAGNOSTIC COMPLETE. HARDWARE AND NETWORK ARE CLEAR. ==", "pass");
            } catch (e) {
                log(`FAIL: Pipeline threw an error: ${e.message}`, "fail");
            }
        }

        runDiagnostics();
    </script>
</body>
</html>
