<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sovereign Forge</title>
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Forge%22,%22short_name%22:%22Forge%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23000%22,%22theme_color%22:%22%23000%22}">
    <style>
        :root { --accent: #00ff88; --bg: #000; --panel: #111; --border: #333; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; padding-top: env(safe-area-inset-top); display: flex; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box; }
        #viewer { width: 100%; aspect-ratio: 1; background: var(--panel); border-radius: 16px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); overflow: hidden; }
        img { width: 100%; height: 100%; object-fit: cover; }
        .controls { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; }
        textarea { width: 100%; background: var(--panel); border: 1px solid var(--border); color: #fff; padding: 16px; border-radius: 12px; font-size: 17px; box-sizing: border-box; outline: none; }
        button { width: 100%; border: none; padding: 18px; border-radius: 12px; font-weight: 700; font-size: 17px; cursor: pointer; }
        #forge-btn { background: var(--accent); color: #000; }
        #status-area { width: 100%; margin-top: 15px; text-align: center; }
        #status { font-size: 13px; color: #888; margin-bottom: 8px; }
        .progress-bar { width: 100%; height: 6px; background: #222; border-radius: 3px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s ease; }
        /* Debug Console */
        #console { width: 100%; margin-top: 20px; background: #080808; border: 1px solid #222; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 10px; color: #555; max-height: 100px; overflow-y: auto; text-align: left; }
    </style>
</head>
<body>

    <div id="viewer">
        <span id="placeholder">A19 Silicon Ready...</span>
    </div>

    <div class="controls">
        <textarea id="prompt" rows="3" placeholder="Vision (e.g., 'Douglas Fir Timber close-up')..."></textarea>
        <button id="forge-btn">INITIATE FORGE</button>
        <div id="status-area">
            <div id="status">System Standby</div>
            <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
        </div>
    </div>

    <div id="console">> Sovereign Boot Sequence...</div>

    <script type="module">
        // Using a more robust ESM provider for browser-direct execution
        import { pipeline, env } from 'https://esm.sh/@xenova/transformers@2.17.2';

        const log = (msg) => {
            const c = document.getElementById('console');
            c.innerHTML += `<br>> ${msg}`;
            c.scrollTop = c.scrollHeight;
            console.log(msg);
        };

        let forge = null;
        const btn = document.getElementById('forge-btn');
        const status = document.getElementById('status');
        const progress = document.getElementById('progress');

        async function init() {
            log("Attaching to A19 Neural Engine...");
            status.innerText = "Attaching to GPU...";
            
            // Bypass the pipeline error by using the specific SD-Turbo logic
            // We use the Auto-detection logic for WebGPU
            env.allowLocalModels = false;
            env.useBrowserCache = true;

            try {
                log("Downloading Model (700MB)... Stay on this screen.");
                // We use a confirmed working SD-Turbo pipeline for Transformers.js v2/v3 transition
                forge = await pipeline('image-to-image', 'Xenova/latent-consistency-model-sdxl-turbo', {
                    device: 'webgpu',
                    progress_callback: (p) => {
                        if (p.status === 'progress') {
                            const pct = Math.round(p.progress);
                            progress.style.width = `${pct}%`;
                            status.innerText = `Hydrating: ${pct}%`;
                        }
                    }
                });
                log("Forge Online. High-Performance Mode.");
                status.innerText = "A19 Forge Online.";
                return true;
            } catch (err) {
                log("CRITICAL ERROR: " + err.message);
                status.innerText = "Error in Handshake.";
                return false;
            }
        }

        btn.onclick = async () => {
            // Wake Lock - prevent iPhone 17 from sleeping during generation
            if ('wakeLock' in navigator) { await navigator.wakeLock.request('screen'); }

            if (!forge) {
                btn.innerText = "LOADING MODEL...";
                const ok = await init();
                if (!ok) {
                    btn.innerText = "RETRY FORGE";
                    return;
                }
            }

            const pText = document.getElementById('prompt').value;
            if (!pText) return;

            btn.disabled = true;
            btn.innerText = "FORGING...";
            log(`Prompting: ${pText}`);
            
            const start = performance.now();
            try {
                // Generative call
                const output = await forge(pText, {
                    num_inference_steps: 4,
                    guidance_scale: 0.0,
                });
                
                const end = performance.now();
                const url = URL.createObjectURL(output.images[0]);
                document.getElementById('viewer').innerHTML = `<img src="${url}">`;
                status.innerText = `Forged in ${((end - start)/1000).toFixed(2)}s`;
                log("Forge Successful.");
            } catch (err) {
                log("Forge Failed: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "FORGE IMAGE";
            }
        };
    </script>
</body>
</html>
