<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sovereign Forge</title>
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Forge%22,%22short_name%22:%22Forge%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23000%22,%22theme_color%22:%22%23000%22}">
    <style>
        :root { --accent: #00ff88; --bg: #000; --panel: #111; --border: #333; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 20px; padding-top: env(safe-area-inset-top); display: flex; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box; }
        
        #viewer { width: 100%; aspect-ratio: 1; background: var(--panel); border-radius: 16px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); overflow: hidden; position: relative; }
        img { width: 100%; height: 100%; object-fit: cover; }
        
        .controls { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; }
        textarea { width: 100%; background: var(--panel); border: 1px solid var(--border); color: #fff; padding: 16px; border-radius: 12px; font-size: 17px; box-sizing: border-box; resize: none; outline: none; }
        textarea:focus { border-color: var(--accent); }
        
        button { width: 100%; border: none; padding: 18px; border-radius: 12px; font-weight: 700; font-size: 17px; transition: transform 0.1s, opacity 0.2s; cursor: pointer; }
        #forge-btn { background: var(--accent); color: #000; }
        #save-btn { background: var(--panel); color: var(--accent); border: 1px solid var(--accent); display: none; margin-top: 10px; }
        button:active { transform: scale(0.98); opacity: 0.8; }
        
        #status-area { width: 100%; margin-top: 15px; text-align: center; }
        #status { font-size: 13px; color: #888; margin-bottom: 8px; font-weight: 500; }
        .progress-bar { width: 100%; height: 6px; background: #222; border-radius: 3px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s ease; }
        
        .hardware-tag { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 1px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="viewer">
        <span id="placeholder">Awaiting Command...</span>
    </div>

    <div class="controls">
        <textarea id="prompt" rows="3" placeholder="Describe your vision (e.g., 'Aged Cedar Lumber in rain')..."></textarea>
        
        <button id="forge-btn">FORGE IMAGE</button>
        <button id="save-btn">SAVE TO VAULT</button>
        
        <div id="status-area">
            <div id="status">Ready. A19 Neural Engine Standby.</div>
            <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
        </div>
    </div>

    <div class="hardware-tag">Sovereign Node // iPhone 17 Pro // WebGPU v3</div>

    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0';

        let forge = null;
        let lastImageBlob = null;
        const btn = document.getElementById('forge-btn');
        const saveBtn = document.getElementById('save-btn');
        const status = document.getElementById('status');
        const progress = document.getElementById('progress');

        async function init() {
            if (!navigator.gpu) {
                status.innerText = "CRITICAL ERROR: WebGPU Disabled in Safari Settings.";
                return;
            }
            
            status.innerText = "Igniting NPU (700MB Optimized Mode)...";
            
            try {
                // Using 'q4' for 4-bit quantization to bypass iPhone RAM limits
                forge = await pipeline('text-to-image', 'Xenova/sdxl-turbo', {
                    device: 'webgpu',
                    dtype: 'q4', 
                    progress_callback: (p) => {
                        const percent = Math.round(p.progress || 0);
                        progress.style.width = `${percent}%`;
                        status.innerText = `Hydrating Silicon: ${percent}%`;
                        if(p.status === 'done') status.innerText = "A19 Neural Engine Online.";
                    }
                });
            } catch (err) {
                status.innerText = "Handshake Failed: " + err.message;
                console.error(err);
            }
        }

        btn.onclick = async () => {
            const pText = document.getElementById('prompt').value;
            if (!pText) { alert("Enter a prompt to begin."); return; }

            if (!forge) await init();
            if (!forge) return; // Exit if init failed
            
            btn.disabled = true;
            btn.innerText = "FORGING...";
            status.innerText = "Processing on A19 NPU...";
            progress.style.width = "0%";
            
            const start = performance.now();
            try {
                const output = await forge(pText, {
                    num_inference_steps: 4,
                    guidance_scale: 0.0,
                });
                
                const end = performance.now();
                lastImageBlob = output.images[0];
                const url = URL.createObjectURL(lastImageBlob);
                
                document.getElementById('viewer').innerHTML = `<img src="${url}">`;
                saveBtn.style.display = "block";
                status.innerText = `Forged in ${((end - start)/1000).toFixed(2)}s`;
                progress.style.width = "100%";
            } catch (err) {
                status.innerText = "Forge Error: Check WebGPU Feature Flags.";
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerText = "FORGE IMAGE";
            }
        };

        // The "Vault" Save Logic (Bypasses Cloud)
        saveBtn.onclick = async () => {
            if (!lastImageBlob) return;
            
            const timestamp = new Date().getTime();
            const fileName = `Forge_${timestamp}.png`;
            
            // Standard mobile download trigger for Files App
            const link = document.createElement('a');
            link.href = URL.createObjectURL(lastImageBlob);
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            status.innerText = "Stored in Local Files.";
        };
    </script>
</body>
</html>
