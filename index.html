<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sovereign Forge</title>
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Forge%22,%22short_name%22:%22Forge%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23000%22,%22theme_color%22:%22%23000%22}">
    <style>
        :root { --accent: #00ff88; --bg: #000; --panel: #111; --border: #333; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; padding-top: env(safe-area-inset-top); display: flex; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box; }
        #viewer { width: 100%; aspect-ratio: 1; background: var(--panel); border-radius: 16px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); overflow: hidden; }
        img { width: 100%; height: 100%; object-fit: cover; }
        .controls { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; }
        textarea { width: 100%; background: var(--panel); border: 1px solid var(--border); color: #fff; padding: 16px; border-radius: 12px; font-size: 17px; box-sizing: border-box; outline: none; }
        button { width: 100%; border: none; padding: 18px; border-radius: 12px; font-weight: 700; font-size: 17px; cursor: pointer; }
        #forge-btn { background: var(--accent); color: #000; }
        #status-area { width: 100%; margin-top: 15px; text-align: center; }
        #status { font-size: 13px; color: #888; margin-bottom: 8px; }
        .progress-bar { width: 100%; height: 6px; background: #222; border-radius: 3px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s ease; }
        #console { width: 100%; margin-top: 20px; background: #080808; border: 1px solid #222; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 10px; color: #555; max-height: 100px; overflow-y: auto; text-align: left; }
    </style>
</head>
<body>

    <div id="viewer"><span id="placeholder">A19 Neural Ready...</span></div>

    <div class="controls">
        <textarea id="prompt" rows="3" placeholder="Lumber prompt..."></textarea>
        <button id="forge-btn">ACTIVATE SILICON</button>
        <div id="status-area">
            <div id="status">Sovereign Mode // WebGPU v3.1</div>
            <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
        </div>
    </div>

    <div id="console">> Initializing A19...</div>

    <script type="module">
        // Using the 2026 Transformers.js v3 branch for text-to-image support
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0-alpha.19';

        const log = (msg) => {
            const c = document.getElementById('console');
            c.innerHTML += `<br>> ${msg}`;
            c.scrollTop = c.scrollHeight;
        };

        env.allowLocalModels = false;
        env.useBrowserCache = true;

        let forge = null;
        const btn = document.getElementById('forge-btn');
        const status = document.getElementById('status');
        const progress = document.getElementById('progress');

        async function init() {
            log("Requesting GPU Handshake...");
            
            // Critical 2026 Mobile Fix: Explicitly check for WebGPU adapter
            if (!navigator.gpu) {
                log("WebGPU not found. Go to Safari Advanced Settings.");
                return false;
            }

            try {
                log("Downloading Sovereign-Turbo (q4)...");
                status.innerText = "Downloading Model...";
                
                // v3.0 logic: text-to-image is now a core pipeline
                forge = await pipeline('text-to-image', 'onnx-community/sdxl-turbo-64-bit-v2', {
                    device: 'webgpu',
                    dtype: 'q4',
                    progress_callback: (p) => {
                        if (p.status === 'progress') {
                            const pct = Math.round(p.progress);
                            progress.style.width = `${pct}%`;
                            status.innerText = `Hydrating: ${pct}%`;
                        }
                    }
                });
                
                log("Silicon Synced. Forge Online.");
                status.innerText = "A19 Neural Engine Active.";
                return true;
            } catch (err) {
                log("SILICON ERROR: " + err.message);
                return false;
            }
        }

        btn.onclick = async () => {
            if (!forge) {
                const ok = await init();
                if (!ok) return;
            }

            const pText = document.getElementById('prompt').value;
            if (!pText) return;

            btn.disabled = true;
            btn.innerText = "FORGING...";
            log("Executing Diffusion on NPU...");
            
            const start = performance.now();
            try {
                // Real-time Turbo generation
                const output = await forge(pText, {
                    num_inference_steps: 1, // Ultra-fast for mobile
                    width: 512,
                    height: 512
                });
                
                const url = URL.createObjectURL(output.images[0]);
                document.getElementById('viewer').innerHTML = `<img src="${url}">`;
                status.innerText = `Forged in ${((performance.now() - start)/1000).toFixed(2)}s`;
                log("Success.");
            } catch (err) {
                log("Forge Error: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "FORGE IMAGE";
            }
        };
    </script>
</body>
</html>
